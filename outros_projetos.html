<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Outros Projetos - Shakaw 3D Print</title>
  <link rel="stylesheet" href="css/index_styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Filtros de categoria */
    .category-filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 30px 0 10px 0;
      flex-wrap: wrap;
      padding: 0 20px;
    }

    .filter-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 2px solid rgba(255,255,255,0.2);
      padding: 9px 22px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
    }

    .filter-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.04);
    }

    .filter-btn.active {
      background: #4fc3f7;
      border-color: #4fc3f7;
      color: #00303f;
    }

    /* Título da seção */
    .section-heading {
      text-align: center;
      color: white;
      font-size: 1.5rem;
      margin: 30px 0 5px 0;
      padding: 0 20px;
    }

    .section-heading span {
      display: inline-block;
      border-bottom: 3px solid #4fc3f7;
      padding-bottom: 6px;
    }

    /* Contador de resultados */
    .results-count {
      text-align: center;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      margin-bottom: 10px;
    }

    /* Mensagem sem produtos */
    .no-products {
      text-align: center;
      color: rgba(255,255,255,0.6);
      padding: 60px 20px;
      font-size: 1.1rem;
    }

    /* Botão adicionar interesse (igual ao catálogo) */
    .add-interest-btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: #0077cc;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.3s, transform 0.2s;
      width: 100%;
    }

    .add-interest-btn:hover {
      background: #005fa3;
      transform: scale(1.02);
    }

    /* Badge de categoria no card */
    .category-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-action-figures {
      background: #e8f4ff;
      color: #0057b7;
    }

    .badge-produtos-funcionais {
      background: #e8fff1;
      color: #1b7a3e;
    }

    /* Animação de entrada dos cards */
    .product {
      animation: fadeInUp 0.35s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- CABEÇALHO -->
  <div class="header">
    <img src="https://shakaw3dprint.github.io/Shakaw_3D_Print/assets/img/logo.webp"
         alt="Logo Shakaw 3D Print" class="logo">
    <h1>Shakaw 3D Print</h1>
    <div class="header-links">
      <a href="home.html"><i class="fas fa-home"></i> Início</a>
      <a href="catalogo_diorama.html"><i class="fas fa-box-open"></i> Catálogo</a>
      <a href="outros_projetos.html"><i class="fas fa-images"></i> Outros Projetos</a>
      <a href="https://www.instagram.com/shakaw3dprint" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"
             alt="Instagram" class="instagram-icon">
        @shakaw3dprint
      </a>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="category-filters">
    <button class="filter-btn active" data-category="all">
      <i class="fas fa-th"></i> Todos
    </button>
    <button class="filter-btn" data-category="action-figures">
      <i class="fas fa-user-astronaut"></i> Action Figures
    </button>
    <button class="filter-btn" data-category="produtos-funcionais">
      <i class="fas fa-toolbox"></i> Produtos Funcionais
    </button>
  </div>

  <!-- CONTADOR -->
  <p class="results-count" id="resultsCount"></p>

  <!-- INDICADOR DE CARREGAMENTO -->
  <div class="loader" id="loader"></div>

  <!-- CATÁLOGO -->
  <div class="catalog-page" id="catalog"></div>

  <!-- MODAL PARA IMAGENS AMPLIADAS -->
  <div id="imgModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <button class="modal-nav modal-prev" onclick="navigateModal(-1)">❮</button>
    <div class="modal-content">
      <img id="modalImg" src="" alt="Imagem ampliada">
    </div>
    <button class="modal-nav modal-next" onclick="navigateModal(1)">❯</button>
    <div class="zoom-controls">
      <button onclick="zoomImage(0.15)">+</button>
      <button onclick="zoomImage(-0.15)">-</button>
      <button onclick="resetZoomAndPan()">Reset</button>
    </div>
  </div>

  <!-- MODAL DE CONTATO -->
  <div id="contactModal" class="contact-modal">
    <div class="contact-modal-content">
      <span class="close-contact"
            onclick="document.getElementById('contactModal').style.display='none'">&times;</span>
      <h2>Enviar Interesses</h2>
      <form id="contactForm"
            action="https://script.google.com/macros/s/AKfycbypHVPUQFxuGJNoawgsXZFZqGwFIMNcWhcJDb0Yb2uCwuRz8QjLoR29PyMmI661wwaUyg/exec"
            method="POST">
        <input type="hidden" name="_next"
               value="https://shakaw3dprint.github.io/Shakaw_3D_Print/obrigado.html">
        <input type="hidden" id="itemsData" name="items_data">

        <div class="form-section">
          <label for="name">Nome:</label>
          <input type="text" id="name" name="name" required>

          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" required>

          <label for="whatsapp">WhatsApp:</label>
          <input type="tel" id="whatsapp" name="whatsapp"
                 placeholder="(00) 00000-0000" required>
        </div>

        <div class="form-section">
          <h3>Resumo dos Itens Selecionados</h3>
          <div id="selectedItemsSummary" class="items-summary"></div>
        </div>

        <div class="form-section">
          <label for="customMessage">Mensagem Adicional:</label>
          <textarea id="customMessage" name="custom_message" rows="4"
                    placeholder="Digite aqui qualquer informação adicional..."></textarea>
        </div>

        <button type="submit">Enviar Interesses</button>
      </form>
    </div>
  </div>

  <!-- BOTÃO VOLTAR AO TOPO -->
  <button id="backToTopBtn" title="Voltar ao topo">⬆️ Topo</button>

  <!-- PAINEL DE INTERESSES -->
  <div id="interestPanel">
    <button id="closeInterestPanelBtn" class="close-interest-panel-btn">&times;</button>
    <h3>Lista de interesses</h3>
    <ul id="interestList"></ul>
    <div id="interestTotal"></div>
    <button onclick="showContactModal()">Enviar Interesses</button>
  </div>

  <!-- BOTÃO ABRIR PAINEL -->
  <button class="interest-btn">💚 Ver interesses</button>

  <!-- SCRIPT ESPECÍFICO DESTA PÁGINA -->
  <script src="js/outros_script.js"></script>
</body>
</html>
