<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Catálogo - Shakaw 3D Print</title>
  <link rel="stylesheet" href="css/index_styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- CABEÇALHO -->
  <div class="header">
    <img src="https://shakaw3dprint.github.io/Shakaw_3D_Print/assets/img/logo.webp"
         alt="Logo Shakaw 3D Print" class="logo">
    <h1>Shakaw 3D Print</h1>
    <div class="header-links">
      <a href="home.html"><i class="fas fa-home"></i> Início</a>
      <a href="catalogo.html"><i class="fas fa-box-open"></i> Catálogo</a>
      <!-- O link "Outros Projetos" foi removido pois o catálogo agora é unificado -->
      <a href="https://www.instagram.com/shakaw3dprint" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"
             alt="Instagram" class="instagram-icon">
        @shakaw3dprint
      </a>
    </div>
  </div>

  <!-- CARROSSEL -->
  <div class="carousel-container">
    <div class="carousel" id="carousel"></div>
    <button class="carousel-btn prev">❮</button>
    <button class="carousel-btn next">❯</button>
    <div class="carousel-indicators" id="carouselIndicators"></div>
  </div>

  <!-- LOADER -->
  <div class="loader" id="loader"></div>

  <!-- FILTROS DE CATEGORIA -->
  <div class="filter-section">
    <h2><i class="fas fa-filter"></i> Filtrar por Categoria</h2>
    <div class="filter-buttons" id="filterButtons">
      <button class="filter-btn active" data-filter="all" onclick="filterProducts('all')">Todos</button>
      <button class="filter-btn" data-filter="diorama-garagem" onclick="filterProducts('diorama-garagem')">Diorama Garagem</button>
      <button class="filter-btn" data-filter="miniaturas-3d" onclick="filterProducts('miniaturas-3d')">Miniaturas 3D</button>
      <button class="filter-btn" data-filter="miniaturas-rpg" onclick="filterProducts('miniaturas-rpg')">Miniaturas RPG</button>
      <button class="filter-btn" data-filter="produtos-funcionais" onclick="filterProducts('produtos-funcionais')">Produtos Funcionais</button>
    </div>
  </div>

  <!-- CATÁLOGO DE PRODUTOS -->
  <div class="catalog-page" id="catalog">
    <p class="loading-message">Carregando produtos...</p>
  </div>

  <!-- MODAL IMAGEM -->
  <div id="imgModal" class="modal">
    <span class="close">&times;</span>
    <button class="modal-nav modal-prev">❮</button>
    <div class="modal-content">
      <img id="modalImg" src="" alt="Imagem ampliada">
    </div>
    <button class="modal-nav modal-next">❯</button>
    <div class="zoom-controls">
      <button id="zoomInBtn">+</button>
      <button id="zoomOutBtn">-</button>
      <button id="zoomResetBtn">Reset</button>
    </div>
  </div>

  <!-- MODAL CONTATO -->
  <div id="contactModal" class="contact-modal">
    <div class="contact-modal-content">
      <span class="close-contact">&times;</span>
      <h2>Enviar Interesses</h2>
      <form id="contactForm"
            action="https://script.google.com/macros/s/AKfycbypHVPUQFxuGJNoawgsXZFZqGwFIMNcWhcJDb0Yb2uCwuRz8QjLoR29PyMmI661wwaUyg/exec"
            method="POST">
        <input type="hidden" name="_next"
               value="https://shakaw3dprint.github.io/Shakaw_3D_Print/obrigado.html">
        <input type="hidden" id="itemsData" name="items_data">

        <div class="form-section">
          <label for="name">Nome:</label>
          <input type="text" id="name" name="name" required>
          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" required>
          <label for="whatsapp">WhatsApp:</label>
          <input type="tel" id="whatsapp" name="whatsapp"
                 placeholder="(00) 00000-0000" required>
        </div>

        <div class="form-section">
          <h3>Resumo dos Itens Selecionados</h3>
          <div id="selectedItemsSummary" class="items-summary"></div>
        </div>

        <div class="form-section">
          <label for="customMessage">Mensagem Adicional:</label>
          <textarea id="customMessage" name="custom_message" rows="4"
                    placeholder="Digite aqui qualquer informação adicional..."></textarea>
        </div>

        <button type="submit">Enviar Interesses</button>
      </form>
    </div>
  </div>

  <!-- BOTÃO TOPO -->
  <button id="backToTopBtn" title="Voltar ao topo">⬆️ Topo</button>

  <!-- PAINEL INTERESSES -->
  <div id="interestPanel">
    <button id="closeInterestPanelBtn" class="close-interest-panel-btn">&times;</button>
    <h3>Lista de interesses</h3>
    <ul id="interestList"></ul>
    <div id="interestTotal"></div>
    <button onclick="showContactModal()">Enviar Interesses</button>
  </div>

  <!-- BOTÃO INTERESSES -->
  <button class="interest-btn">💚 Ver interesses</button>

  <script src="js/index_script.js"></script>
</body>
</html>
