<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakaw 3D Print - Catálogo</title>
    <link rel="stylesheet" href="css/index_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <a href="home.html" class="logo">
                <img src="assets/img/logo.webp" alt="Shakaw 3D Print Logo">
                Shakaw 3D Print
            </a>
            <nav>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="catalogo.html" class="active">Catálogo</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button id="openInterestPanelFromHeader" class="interest-toggle-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="interest-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="catalog-page-content">
        <div class="container">
            <section class="filter-section">
                <div class="filter-group">
                    <label for="categoryFilter">Categoria:</label>
                    <select id="categoryFilter">
                        <option value="all">Todas</option>
                        <option value="diorama-garagem">Diorama Garagem</option>
                        <option value="miniaturas-3d">Miniaturas 3D</option>
                        <option value="miniaturas-rpg">Miniaturas RPG</option>
                        <option value="produtos-funcionais">Funcional</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="searchInput">Buscar:</label>
                    <input type="text" id="searchInput" placeholder="Nome ou descrição...">
                </div>
                <div class="filter-group">
                    <label for="sortSelect">Ordenar por:</label>
                    <select id="sortSelect">
                        <option value="price-asc">Preço (Menor ao Maior)</option>
                        <option value="price-desc">Preço (Maior ao Menor)</option>
                    </select>
                </div>
                <p id="resultsCount" class="results-count">0 produtos encontrados.</p>
            </section>

            <section id="catalogGrid" class="catalog-grid">
                <!-- Produtos serão carregados aqui pelo JavaScript -->
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Shakaw 3D Print. Todos os direitos reservados.</p>
            <div class="social-links">
                <a href="https://www.instagram.com/shakaw3dprint/" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/5511999999999" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </footer>

    <!-- Modal de Imagem (Detalhes do Produto) -->
    <div id="imgModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalProductName"></h2>
            <div class="modal-main-image-container">
                <img id="modalImg" src="" alt="Imagem do Produto">
                <button class="modal-nav modal-prev"><i class="fas fa-chevron-left"></i></button>
                <button class="modal-nav modal-next"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="modal-controls">
                <button id="zoomOutBtn"><i class="fas fa-search-minus"></i></button>
                <button id="zoomInBtn"><i class="fas fa-search-plus"></i></button>
                <button id="zoomResetBtn"><i class="fas fa-redo"></i></button>
            </div>
            <p id="modalProductDescription" class="modal-product-description"></p>
            <div id="modalThumbnails" class="modal-thumbnails">
                <!-- Miniaturas serão carregadas aqui -->
            </div>
        </div>
    </div>

    <!-- Painel de Interesses (Carrinho) -->
    <div id="interestPanel" class="interest-panel">
        <div class="interest-panel-header">
            <h3>Sua Lista de Interesses</h3>
            <button id="closeInterestPanelBtn" class="close-interest-panel-btn">&times;</button>
        </div>
        <ul id="interestList" class="interest-list">
            <!-- Itens de interesse serão carregados aqui -->
        </ul>
        <div class="interest-panel-footer">
            <p class="interest-total">Total: R$ <span id="interestTotal">0,00</span></p>
            <button id="openContactModalBtn" class="open-contact-modal-btn">Entrar em Contato</button>
        </div>
    </div>

    <!-- Modal de Contato -->
    <div id="contactModal" class="contact-modal">
        <div class="contact-modal-content">
            <span class="close-contact">&times;</span>
            <h2>Solicitação de Orçamento</h2>
            <p>Preencha o formulário abaixo para enviar sua lista de interesses.</p>
            <form action="https://formsubmit.co/seu-email@exemplo.com" method="POST"> <!-- ATUALIZE SEU EMAIL AQUI -->
                <input type="hidden" name="_subject" value="Solicitação de Orçamento - Shakaw 3D Print">
                <input type="hidden" name="_template" value="box">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://www.shakaw3dprint.com.br/obrigado.html"> <!-- Crie uma página de obrigado.html -->

                <label for="name">Nome:</label>
                <input type="text" id="name" name="Nome" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="Email" required>

                <label for="phone">Telefone (WhatsApp):</label>
                <input type="tel" id="phone" name="Telefone" placeholder="(DD) 9XXXX-XXXX" required>

                <label for="message">Mensagem (opcional):</label>
                <textarea id="message" name="Mensagem"></textarea>

                <input type="hidden" id="selectedItemsSummary" name="Itens_Selecionados">
                <input type="hidden" id="itemsData" name="Dados_Itens">

                <button type="submit">Enviar Solicitação</button>
            </form>
        </div>
    </div>

    <button id="backToTopBtn" title="Voltar ao Topo"><i class="fas fa-arrow-up"></i></button>

    <script src="js/script.js"></script>
</body>
</html>
