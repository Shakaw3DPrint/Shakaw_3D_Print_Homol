<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Catálogo - Shakaw 3D Print</title>
  <link rel="stylesheet" href="css/index_styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- CABEÇALHO -->
  <div class="header">
    <div class="header-left">
      <img src="https://shakaw3dprint.github.io/Shakaw_3D_Print/assets/img/logo.webp"
           alt="Logo Shakaw 3D Print" class="logo">
      <h1>Shakaw 3D Print</h1>
    </div>
    <div class="header-links">
      <a href="home.html"><i class="fas fa-home"></i> Início</a>
      <a href="catalogo.html"><i class="fas fa-box-open"></i> Catálogo</a>
      <a href="https://www.instagram.com/shakaw3dprint" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"
             alt="Instagram" class="instagram-icon">
        @shakaw3dprint
      </a>
      <button id="openInterestPanelFromHeader"
              class="header-interest-btn">
        <i class="fas fa-shopping-cart"></i>
        <span>Lista de interesse</span>
      </button>
    </div>
  </div>

  <!-- LOADER -->
  <div class="loader" id="loader"></div>

  <!-- FILTROS DE CATEGORIA -->
  <div class="filter-section">
    <h2><i class="fas fa-filter"></i> Filtrar por Categoria</h2>
    <div class="filter-buttons" id="filterButtons">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="diorama-garagem">Diorama Garagem</button>
      <button class="filter-btn" data-filter="miniaturas-3d">Miniaturas 3D</button>
      <button class="filter-btn" data-filter="miniaturas-rpg">Miniaturas RPG</button>
      <button class="filter-btn" data-filter="produtos-funcionais">Produtos Funcionais</button>
      <!-- Removido o botão "Action Figures" daqui, pois será mapeado para "Miniaturas 3D" no JS -->
    </div>
  </div>

  <!-- CONTADOR DE RESULTADOS -->
  <p class="results-count" id="resultsCount"></p>

  <!-- CATÁLOGO DE PRODUTOS -->
  <div class="catalog-page" id="catalog">
    <p class="loading-message">Carregando produtos...</p>
  </div>

  <!-- Painel de interesses (lateral) -->
  <div id="interestPanel" class="interest-panel">
    <button class="close-interest-panel-btn" id="closeInterestPanelBtn">&times;</button>
    <h3>Sua Lista de Interesses</h3>
    <ul id="interestList"></ul>
    <div id="interestTotal"></div>
    <button id="openContactModalBtn">Finalizar Registro de Interesse</button>
  </div>

  <!-- Modal de Imagem (Zoom e Pan) -->
  <div id="imgModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImg">
    <button class="modal-nav modal-prev"><i class="fas fa-chevron-left"></i></button>
    <button class="modal-nav modal-next"><i class="fas fa-chevron-right"></i></button>
    <div class="zoom-controls">
      <button id="zoomInBtn"><i class="fas fa-plus"></i></button>
      <button id="zoomOutBtn"><i class="fas fa-minus"></i></button>
      <button id="zoomResetBtn"><i class="fas fa-sync-alt"></i></button>
    </div>
  </div>

  <!-- Modal de Contato -->
  <div id="contactModal" class="contact-modal">
    <div class="contact-modal-content">
      <span class="close-contact">&times;</span>
      <h2>Registrar Interesse</h2>
      <form id="contactForm" action="https://formsubmit.co/shakaw3dprint@hotmail.com" method="POST">
        <div class="form-section">
          <h3>Seus Dados</h3>
          <label for="name">Nome:</label>
          <input type="text" id="name" name="Nome" required>

          <label for="email">E-mail:</label>
          <input type="email" id="email" name="Email" required>

          <label for="phone">Telefone (WhatsApp):</label>
          <input type="tel" id="phone" name="Telefone" placeholder="(XX) XXXXX-XXXX" required>

          <label for="message">Mensagem (opcional):</label>
          <textarea id="message" name="Mensagem" rows="4" placeholder="Alguma observação ou dúvida?"></textarea>
        </div>

        <div class="form-section">
          <h3>Itens de Interesse</h3>
          <div id="selectedItemsSummary" class="items-summary"></div>
          <input type="hidden" name="_subject" value="Novo Interesse no Site Shakaw 3D Print">
          <input type="hidden" name="_template" value="box">
          <input type="hidden" name="Itens de Interesse" id="itemsData">
          <input type="hidden" name="_captcha" value="false">
        </div>

        <button type="submit">Enviar Interesse</button>
      </form>
    </div>
  </div>

  <!-- BOTÃO TOPO -->
  <button id="backToTopBtn" title="Voltar ao Topo"><i class="fas fa-arrow-up"></i></button>

  <script src="js/script.js"></script>
</body>
</html>
